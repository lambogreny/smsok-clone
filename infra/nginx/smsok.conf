# SMSOK — Nginx reverse proxy with HTTPS redirect + CDN caching

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name smsok.9phum.me;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smsok.9phum.me;

    # SSL — Let's Encrypt (certbot)
    ssl_certificate /etc/letsencrypt/live/smsok.9phum.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smsok.9phum.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (defense in depth — Next.js also sets these)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public files
    location /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1d;
    }

    location /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
    }

    # App
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check — no logging
    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}

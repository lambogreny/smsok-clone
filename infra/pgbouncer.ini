;; ══════════════════════════════════════════════
;; PgBouncer — SMSOK Connection Pooling
;; ══════════════════════════════════════════════

[databases]
;; Dev: local PostgreSQL
smsok = host=localhost port=5432 dbname=smsok

;; Docker: mapped port
; smsok = host=localhost port=5434 dbname=smsok

[pgbouncer]
;; Listen
listen_addr = 127.0.0.1
listen_port = 6432

;; Auth
auth_type = trust
auth_file = /Users/lambogreny/oracles/smsok-clone/infra/pgbouncer_users.txt

;; Pool mode: transaction (best for web apps — releases conn after each tx)
pool_mode = transaction

;; Pool sizing
;; Dev: 20 connections, Prod: 100
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Limits
max_client_conn = 200
max_db_connections = 50

;; Timeouts
server_idle_timeout = 300
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

;; Admin
admin_users = lambogreny
stats_users = lambogreny

;; Misc
ignore_startup_parameters = extra_float_digits
server_reset_query = DISCARD ALL
pidfile = /tmp/pgbouncer.pid
logfile = /tmp/pgbouncer.log

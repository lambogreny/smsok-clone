upstream smsok_app {
    server 127.0.0.1:3458;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name smsok.9phum.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smsok.9phum.me;

    # SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/smsok.9phum.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smsok.9phum.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Client body size (for file uploads)
    client_max_body_size 10m;

    # Next.js static files (long cache)
    location /_next/static/ {
        proxy_pass http://smsok_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check (no rate limit)
    location /api/health {
        proxy_pass http://smsok_app;
        proxy_set_header Host $host;
        access_log off;
    }

    # API rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://smsok_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # All other routes
    location / {
        proxy_pass http://smsok_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

services:
  app:
    image: ghcr.io/lambogreny/smsok-clone:latest
    ports:
      - "3458:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - OTP_HASH_SECRET=${OTP_HASH_SECRET}
      - OTP_BYPASS_CODE=${OTP_BYPASS_CODE:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - EASYTHUNDER_API_KEY=${EASYTHUNDER_API_KEY:-}
      - SMS_API_URL=${SMS_API_URL}
      - SMS_API_USERNAME=${SMS_API_USERNAME}
      - SMS_API_PASSWORD=${SMS_API_PASSWORD}
      - EASYSLIP_API_KEY=${EASYSLIP_API_KEY}
      - EASYSLIP_API_URL=${EASYSLIP_API_URL}
      - CRON_SECRET=${CRON_SECRET:-}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - TWO_FA_ENCRYPTION_KEY=${TWO_FA_ENCRYPTION_KEY:-}
      - COMMIT_SHA=${COMMIT_SHA:-latest}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_BUCKET_SLIPS=${R2_BUCKET_SLIPS:-smsok-slips}
      - R2_BUCKET_DOCS=${R2_BUCKET_DOCS:-smsok-docs}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "smsok-app"
    labels:
      - "com.centurylinklabs.watchtower.scope=smsok"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-smsok}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-smsok}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=192MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=100
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_statement=ddl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smsok}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "smsok-db"
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "smsok-redis"
    deploy:
      resources:
        limits:
          memory: 128M

  workers:
    image: ghcr.io/lambogreny/smsok-clone:latest
    command: ["node", "-e", "require('./workers/start.js')"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - SMS_API_URL=${SMS_API_URL}
      - SMS_API_USERNAME=${SMS_API_USERNAME}
      - SMS_API_PASSWORD=${SMS_API_PASSWORD}
      - OTP_HASH_SECRET=${OTP_HASH_SECRET}
      - EASYSLIP_API_KEY=${EASYSLIP_API_KEY}
      - EASYSLIP_API_URL=${EASYSLIP_API_URL}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_BUCKET_SLIPS=${R2_BUCKET_SLIPS:-smsok-slips}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.scope=smsok"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "smsok-workers"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  # Auto-deploy: watches GHCR for new images, pulls & restarts automatically
  # No SSH needed after initial setup — push to main → GHCR → Watchtower pulls
  watchtower:
    image: containrrr/watchtower:latest
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCOPE=smsok
      - WATCHTOWER_LIFECYCLE_HOOKS=true
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      - WATCHTOWER_HTTP_API_METRICS=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-watchtower-secret-change-me}
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFY_URL:-}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG_PATH:-/home/byteder/.docker/config.json}:/config.json:ro
    labels:
      - "com.centurylinklabs.watchtower.scope=smsok"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        tag: "smsok-watchtower"

volumes:
  pgdata:
  redisdata:

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smsok
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: smsok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smsok"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smsok:test_password@localhost:5432/smsok_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-ci
      TWO_FA_ENCRYPTION_KEY: test-2fa-key-ci
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma db push
      - run: bun run test --run
        id: unit-test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smsok
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: smsok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smsok"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smsok:test_password@localhost:5432/smsok_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-ci
      TWO_FA_ENCRYPTION_KEY: test-2fa-key-ci
      NODE_ENV: test
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma db push

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Run E2E tests
        run: bun run test:e2e
        id: e2e-test

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to 103.114.203.44
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/smsok-clone
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            npm install --force
            NEXT_TELEMETRY_DISABLED=1 npm run build
            pm2 restart smsok --update-env || pm2 start npm --name smsok -- start
            pm2 save

      - name: Verify health
        run: curl -fsS --retry 5 --retry-delay 5 https://smsok.9phum.me/api/health

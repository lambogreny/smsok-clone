name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra image tag (for manual deploys)"
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: write
    outputs:
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image_ref: ${{ steps.vars.outputs.image_ref }}
      image_tags: ${{ steps.tags.outputs.tags }}
    steps:
      - name: Resolve build context
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            COMMIT_SHA="${{ github.sha }}"
          fi

          SHORT_SHA="${COMMIT_SHA::7}"

          {
            echo "commit_sha=$COMMIT_SHA"
            echo "short_sha=$SHORT_SHA"
            echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          TAGS="$TAGS"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.short_sha }}"

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAGS="$TAGS"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.commit_sha }}
            org.opencontainers.image.title=smsok-clone
          build-args: |
            COMMIT_SHA=${{ steps.vars.outputs.commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    outputs:
      watchtower_status: ${{ steps.watchtower.outputs.status }}
      health_url: ${{ steps.health-url.outputs.url }}
    steps:
      - name: Resolve health check URL
        id: health-url
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -n "$PRODUCTION_URL" ]; then
            echo "url=${PRODUCTION_URL%/}/api/health" >> "$GITHUB_OUTPUT"
          elif [ -n "$SERVER_HOST" ]; then
            echo "url=http://$SERVER_HOST:3458/api/health" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Watchtower API
        id: watchtower
        continue-on-error: true
        shell: bash
        env:
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_URL }}
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_URL" ] || [ -z "$WATCHTOWER_TOKEN" ]; then
            echo "status=not-configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HTTP_CODE=$(curl -fsS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            "${WATCHTOWER_URL%/}/v1/update" || true)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=triggered" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Check SSH fallback readiness
        id: ssh-ready
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -n "$SERVER_HOST" ] && [ -n "$SERVER_USER" ] && [ -n "$SERVER_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH fallback
        if: steps.watchtower.outputs.status != 'triggered' && steps.ssh-ready.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/smsok-clone
            docker compose -f docker-compose.prod.yml pull app
            COMMIT_SHA=${{ needs.build-and-push.outputs.commit_sha }} docker compose -f docker-compose.prod.yml up -d --remove-orphans app
            docker image prune -f

      - name: Deploy summary
        if: always()
        shell: bash
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build-and-push.outputs.image_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.build-and-push.outputs.commit_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Watchtower | ${{ steps.watchtower.outputs.status || 'not-configured' }} |" >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always() && needs.build-and-push.result == 'success'
    steps:
      - name: Poll production health
        shell: bash
        env:
          HEALTH_URL: ${{ needs.deploy.outputs.health_url }}
          EXPECTED_COMMIT: ${{ needs.build-and-push.outputs.commit_sha }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "Health URL not configured. Set PRODUCTION_URL or SERVER_HOST secret to enable verification."
            exit 0
          fi

          echo "Checking $HEALTH_URL"
          for attempt in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 10 "$HEALTH_URL" 2>/dev/null || true)
            STATUS=$(printf '%s' "$BODY" | jq -r '.status // empty')
            VERSION=$(printf '%s' "$BODY" | jq -r '.version // empty')

            if [ "$STATUS" = "healthy" ]; then
              echo "Healthy on attempt $attempt"
              printf '%s\n' "$BODY"

              if [ -n "$VERSION" ] && [ "$VERSION" != "$EXPECTED_COMMIT" ] && [ "$VERSION" != "${EXPECTED_COMMIT::7}" ]; then
                echo "::warning::Health endpoint is healthy but version is $VERSION, expected $EXPECTED_COMMIT"
              fi

              exit 0
            fi

            echo "Attempt $attempt/12 pending"
            sleep 15
          done

          echo "::error::Production health check did not turn healthy in time"
          exit 1

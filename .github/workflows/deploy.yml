name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to 103.114.203.44
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/smsok-clone
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            rm -rf .next
            npm install --force
            LIGHTNING_VER="$(node -e 'console.log(require("./node_modules/lightningcss/package.json").version)')"
            OXIDE_VER="$(node -e 'console.log(require("./node_modules/@tailwindcss/oxide/package.json").version)')"
            npm install "lightningcss-linux-x64-gnu@${LIGHTNING_VER}" "@tailwindcss/oxide-linux-x64-gnu@${OXIDE_VER}" --no-save --force
            NEXT_TELEMETRY_DISABLED=1 npm run build
            PORT=3000 HOSTNAME=0.0.0.0 pm2 restart smsok --update-env || PORT=3000 HOSTNAME=0.0.0.0 pm2 start node --name smsok -- .next/standalone/server.js
            pm2 save

      - name: Verify health
        run: curl -fsS --retry 5 --retry-delay 5 https://smsok.9phum.me/api/health

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run lint
      - run: bunx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smsok
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: smsok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smsok"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma db push
        env:
          DATABASE_URL: postgresql://smsok:test_password@localhost:5432/smsok_test
      - run: bun run test || echo "No tests configured yet — skipping"
        env:
          DATABASE_URL: postgresql://smsok:test_password@localhost:5432/smsok_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET: build-check-secret
          TWO_FA_ENCRYPTION_KEY: build-check-key
